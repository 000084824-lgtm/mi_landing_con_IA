<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ramos inspirados en la estética japonesa, envío rápido y atención personalizada.">
  <title>Flor de Cerezo — Regala un momento bonito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
<body>
  <header role="banner" aria-label="Hero principal">
  <link rel="icon" href="assets/favicon.ico">
  <meta property="og:title" content="Flor de Cerezo — Regala un momento bonito">
  <meta property="og:description" content="Ramos inspirados en la estética japonesa, envío rápido y atención personalizada.">
  <meta property="og:image" content="https://picsum.photos/id/1016/1200/630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#FFF7F9">
</head>
<body>
  <a class="skip-link" href="#hero-title">Saltar al contenido</a>
  <header role="banner" aria-label="Hero principal">
    <div class="container">
      <main>
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-content">
            <div class="eyebrow" aria-hidden="true">Flor de Cerezo</div>
            <h1 id="hero-title">Regala un momento bonito</h1>
            <p class="lead">Ramos hechos a mano para sorprender a quien quieras.</p>
            <div class="ctas">
              <a href="https://www.instagram.com/gabyd._1/" target="_blank" rel="noopener noreferrer" class="btn btn-primary" role="button" aria-label="Enviar un mensaje por Instagram para pedir un ramo">Quiero mandar mi ramo</a>
              <a href="#ramos" class="btn btn-ghost">Ver ramos</a>
            </div>
            <div class="microcopy" aria-live="polite">Envío en 24h · Flores frescas</div>
          </div>

          <figure class="hero-figure">
            <picture>
              <source
                srcset="https://picsum.photos/id/1015/480/320 480w, https://picsum.photos/id/1016/800/600 800w, https://picsum.photos/id/1018/1600/900 1600w"
                sizes="(max-width:900px) 100vw, 520px">
              <img
                src="https://picsum.photos/id/1016/800/600"
                srcset="https://picsum.photos/id/1015/480/320 480w, https://picsum.photos/id/1016/800/600 800w, https://picsum.photos/id/1018/1600/900 1600w"
                sizes="(max-width:900px) 100vw, 520px"
                alt="Ramo delicado en tonos pastel, presentado en caja para regalar"
                width="800" height="600" fetchpriority="high"
                decoding="async"
                onerror="this.onerror=null;this.src='https://picsum.photos/id/1025/800/600'">
            </picture>
            <noscript>
              <div style="background:#F8D7E0;color:#222;padding:2rem;border-radius:12px;text-align:center">Imagen del producto: ramo delicado en tonos pastel.</div>
            </noscript>
          </figure>
        </section>
      </main>
    </div>
  </header>
</body>
</html>
